<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>KiKxxl-evroTarget — Organization Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#f0f4ff;--surface:#fff;--border:#dde3f0;--text:#111827;--muted:#6b7280;--accent:#1d4ed8;--teal:#0f766e;--font:'Outfit',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.06);position:sticky;top:0;z-index:300;}
.brand{display:flex;align-items:center;gap:.65rem;}
.badge{background:var(--accent);color:#fff;font-size:.68rem;font-weight:700;letter-spacing:.07em;padding:.22rem .55rem;border-radius:5px;text-transform:uppercase;white-space:nowrap;}
.brand-name{font-size:1rem;font-weight:700;color:var(--text);}
.btn{padding:.38rem .9rem;border-radius:7px;font-family:var(--font);font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:all .13s;text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#1e40af;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}.btn-ghost:hover{color:var(--text);}
.role-tag{font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.18rem .5rem;border-radius:4px;}
.role-tag.admin{background:#fef3c7;color:#92400e;}
.role-tag.editor{background:#dbeafe;color:#1d4ed8;}
.role-tag.viewer{background:#f1f5f9;color:#475569;}
.role-tag.developer{background:#f0fdf4;color:#0f766e;}
.role-tag.superadmin{background:#fae8ff;color:#7e22ce;}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.5rem 1.5rem;display:flex;align-items:center;gap:.6rem;flex-shrink:0;flex-wrap:wrap;}
.toolbar input{padding:.36rem .7rem;border:1px solid var(--border);border-radius:7px;font-family:var(--font);font-size:.83rem;color:var(--text);outline:none;width:200px;background:var(--bg);}
.toolbar input:focus{border-color:var(--accent);background:#fff;}
.hint{font-size:.75rem;color:#9ca3af;margin-left:auto;}

.layout-toggle{display:inline-flex;border:1px solid var(--border);border-radius:7px;background:#fff;overflow:hidden;}
.layout-toggle .lt-btn{border:none;background:transparent;padding:.3rem .65rem;font-family:var(--font);font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;border-right:1px solid var(--border);white-space:nowrap;}
.layout-toggle .lt-btn:last-child{border-right:none;}
.layout-toggle .lt-btn:hover{color:var(--text);background:#f8fafc;}
.layout-toggle .lt-btn.active{background:var(--accent);color:#fff;}
.page{display:flex;flex:1;position:relative;}
#chart-wrap{flex:1;overflow:auto;padding:3rem 2rem 4rem;display:flex;justify-content:flex-start;align-items:flex-start;min-width:0;}
#chart-wrap>*{margin:0 auto;min-width:max-content;}
/* Tree connectors — clearer, more defined hierarchy lines */
.subtree{display:flex;flex-direction:column;align-items:center;}
.subtree-children{display:flex;flex-direction:column;align-items:center;}
.children-row{display:flex;gap:2.5rem;align-items:flex-start;position:relative;padding-top:1.1rem;}
.children-row::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:2.5px;height:1.1rem;background:#64748b;border-radius:2px;}
.children-row.multi::after{content:'';position:absolute;top:1.1rem;left:0;right:0;height:2.5px;background:#64748b;border-radius:2px;}
.child-col{display:flex;flex-direction:column;align-items:center;position:relative;padding-top:1.1rem;}
.child-col::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:2.5px;height:1.1rem;background:#64748b;border-radius:2px;}
.connector-down{width:2.5px;height:1.4rem;background:#64748b;border-radius:2px;flex-shrink:0;}
/* Vertical (stacked) children layout — used when 3+ siblings of equal rank */
.children-row.vertical{flex-direction:column;align-items:flex-start;gap:.95rem;padding-top:1.1rem;padding-left:1.5rem;}
.children-row.vertical::after{display:none;}
.children-row.vertical::before{top:0;left:1.5rem;transform:none;width:2.5px;height:calc(100% - .95rem);background:#64748b;border-radius:2px;}
.children-row.vertical>.child-col{padding-top:0;padding-left:1.5rem;align-items:flex-start;}
.children-row.vertical>.child-col::before{top:50%;left:0;transform:translateY(-50%);width:1.5rem;height:2.5px;background:#64748b;border-radius:2px;}
/* Employee card */
.node-card{width:220px;background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);transition:box-shadow .2s,border-color .2s;user-select:none;flex-shrink:0;}
.node-card:hover{box-shadow:0 5px 20px rgba(29,78,216,.12);}
.node-card.expanded{border-color:var(--accent);box-shadow:0 8px 28px rgba(29,78,216,.18);}
.card-stripe{height:5px;}
.card-header{padding:.75rem .9rem .6rem;display:flex;gap:.65rem;align-items:flex-start;cursor:pointer;}
.card-header:hover{background:#fafbff;}
.card-avatar{width:38px;height:38px;border-radius:10px;flex-shrink:0;border:2px solid #e0e7ff;transition:width .25s,height .25s;}
.node-card.expanded .card-avatar{width:50px;height:50px;}
.card-text{flex:1;min-width:0;}
.card-title{font-size:.83rem;font-weight:700;color:var(--text);line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.node-card.expanded .card-title{-webkit-line-clamp:unset;overflow:visible;}
.card-name{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.2rem;}
.node-card.expanded .card-name{white-space:normal;}
.card-dept{display:inline-flex;align-items:center;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:.15rem .45rem;border-radius:4px;cursor:pointer;border:none;font-family:var(--font);margin-top:.25rem;}
.card-dept:hover{box-shadow:0 0 0 2px currentColor;}
.proj-chips{display:flex;flex-wrap:wrap;gap:.2rem;margin-top:.25rem;}
.proj-chip{display:inline-flex;align-items:center;gap:.2rem;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:.1rem .35rem;border-radius:4px;background:#ccfbf1;color:#0f766e;cursor:pointer;border:1px solid transparent;}
.proj-chip:hover{border-color:#0f766e;}
.proj-chip.primary{background:#0f766e;color:#fff;}
.div-chips{display:flex;flex-wrap:wrap;gap:.2rem;margin-top:.2rem;}
.div-chip{display:inline-flex;align-items:center;gap:.2rem;font-size:.58rem;font-weight:700;letter-spacing:.04em;padding:.1rem .35rem;border-radius:4px;background:#ede9fe;color:#6d28d9;border:1px solid transparent;}
/* Project employees: double-outline visual style — distinct from dept employees */
.node-card.project-employee{border:1.5px solid var(--border);outline:2px solid var(--surface);outline-offset:2px;box-shadow:0 0 0 1.5px var(--border),0 2px 10px rgba(0,0,0,.07);}
.node-card.project-employee:hover{box-shadow:0 0 0 1.5px #0f766e,0 5px 20px rgba(15,118,110,.18);}
.node-card.project-employee.expanded{box-shadow:0 0 0 1.5px var(--accent),0 8px 28px rgba(29,78,216,.18);}
/* Faded state for non-members when a dept/project panel is open */
.node-card.faded{opacity:.28;transition:opacity .2s;}
.node-card.faded:hover{opacity:.55;}
/* Division name line under the dept badge on the card */
.card-div-line{display:flex;flex-wrap:wrap;align-items:center;gap:.25rem;margin-top:.18rem;font-size:.66rem;font-weight:700;letter-spacing:.02em;line-height:1.1;}
.card-div-line .div-name{display:inline-flex;align-items:center;}
.card-div-line .div-sep{color:#cbd5e1;font-weight:400;}
/* Division group cluster header */
.division-group{align-items:center;}
.division-group-head{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .7rem;border:1.5px solid;border-radius:100px;font-size:.7rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;background:#fff;}
.division-group-dot{width:8px;height:8px;border-radius:50%;}
.division-group-count{background:rgba(0,0,0,.08);color:inherit;padding:.05rem .4rem;border-radius:100px;font-size:.62rem;}
.loc-tag{display:inline-flex;align-items:center;gap:.2rem;font-size:.6rem;font-weight:600;padding:.1rem .38rem;border-radius:3px;background:#f1f5f9;color:#475569;margin-top:.22rem;white-space:nowrap;}
.card-detail{max-height:0;overflow:hidden;transition:max-height .35s,opacity .25s;opacity:0;}
.node-card.expanded .card-detail{max-height:800px;opacity:1;}
.card-detail-inner{padding:.1rem .9rem .85rem;border-top:1px solid #eef0fb;}
.d-label{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-top:.7rem;margin-bottom:.3rem;}
.d-row{display:flex;gap:.45rem;align-items:flex-start;font-size:.78rem;color:var(--text);margin-bottom:.28rem;line-height:1.4;}
.d-row a{color:var(--accent);text-decoration:none;}
.d-bio{font-size:.78rem;color:#374151;line-height:1.65;}
.email-extra{font-size:.72rem;color:var(--muted);margin-top:.15rem;padding-left:1.05rem;}
.email-extra a{color:var(--muted) !important;}
.email-label{display:inline-block;font-size:.6rem;font-weight:600;color:#94a3b8;background:#f1f5f9;padding:.05rem .3rem;border-radius:3px;margin-left:.3rem;}
.card-expand-toggle{text-align:center;font-size:.63rem;color:#a5b4fc;padding:.25rem 0 .3rem;border-top:1px solid #f1f5f9;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.3rem;}
.card-expand-toggle:hover{background:#f5f7ff;color:var(--accent);}
.arrow{display:inline-block;transition:transform .25s;}
.node-card.expanded .arrow{transform:rotate(180deg);}
.card-tree-toggle{text-align:center;font-size:.62rem;color:#c7d2fe;padding:.2rem 0 .26rem;border-top:1px dashed #e0e7ff;cursor:pointer;}
.card-tree-toggle:hover{background:#f0f4ff;color:var(--accent);}
/* Virtual / Leadership node */
.virtual-node{width:240px;background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(49,46,129,.35);flex-shrink:0;}
.virtual-node-inner{padding:.85rem 1rem;display:flex;align-items:center;gap:.7rem;}
.virtual-node-icon{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem;}
.virtual-node-name{font-size:.95rem;font-weight:700;color:#fff;line-height:1.2;}
.virtual-node-sub{font-size:.7rem;color:rgba(255,255,255,.6);margin-top:.12rem;}
/* Department pass-through node */
.dept-node{width:220px;background:var(--surface);border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);flex-shrink:0;cursor:pointer;transition:box-shadow .2s;}
.dept-node:hover{box-shadow:0 5px 22px rgba(0,0,0,.14);}
.dept-node-stripe{height:5px;}
.dept-node-inner{padding:.65rem .85rem;display:flex;align-items:center;gap:.6rem;}
.dept-node-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem;}
.dept-node-name{font-size:.88rem;font-weight:700;line-height:1.2;}
.dept-node-sub{font-size:.68rem;color:var(--muted);margin-top:.1rem;}
/* Operations pass-through (structural, no employees) */
.ops-node{width:220px;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(15,118,110,.1);flex-shrink:0;cursor:default;}
.ops-node-inner{padding:.65rem .85rem;display:flex;align-items:center;gap:.6rem;}
.ops-node-icon{width:36px;height:36px;border-radius:9px;background:#dcfce7;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem;}
.ops-node-name{font-size:.88rem;font-weight:700;color:var(--teal);line-height:1.2;}
.ops-node-sub{font-size:.68rem;color:var(--muted);margin-top:.1rem;}
/* Project node */
.project-node{width:220px;background:linear-gradient(135deg,#f0fdf4,#ccfbf1);border:2.5px dashed #0f766e;border-radius:16px;overflow:hidden;box-shadow:0 2px 10px rgba(15,118,110,.12);cursor:pointer;flex-shrink:0;transition:box-shadow .2s;}
.project-node:hover{box-shadow:0 5px 22px rgba(15,118,110,.22);}
.project-node-stripe{height:6px;background:repeating-linear-gradient(90deg,#0f766e 0,#0f766e 8px,transparent 8px,transparent 14px);}
.project-node-inner{padding:.7rem .85rem;display:flex;align-items:center;gap:.65rem;}
.project-node-icon{width:42px;height:42px;border-radius:10px;background:#0f766e;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:1.05rem;}
.project-node-name{font-size:.95rem;font-weight:700;color:#0f766e;line-height:1.2;}
.project-node-sub{font-size:.7rem;color:#6b7280;margin-top:.18rem;}
.pc-status{display:inline-block;font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:.08rem .35rem;border-radius:3px;margin-left:.3rem;}
.pc-status.active{background:#dcfce7;color:#166534;}
.pc-status.onboarding{background:#fef9c3;color:#854d0e;}
.pc-status.paused{background:#fde68a;color:#92400e;}
.pc-status.ended{background:#fecaca;color:#991b1b;}
/* Division node */
.division-node{width:220px;border-radius:13px;overflow:hidden;box-shadow:0 2px 10px rgba(99,102,241,.12);flex-shrink:0;}
.division-node-stripe{height:4px;}
.division-node-inner{padding:.6rem .8rem;display:flex;align-items:center;gap:.55rem;background:linear-gradient(135deg,#fafafa,#f5f3ff);}
.division-node-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.85rem;}
.division-node-name{font-size:.84rem;font-weight:700;line-height:1.2;}
.division-node-sub{font-size:.66rem;color:var(--muted);margin-top:.1rem;}
/* Location sub-node */
.location-node{width:220px;background:linear-gradient(135deg,#f8faff,#eff6ff);border:2px solid #93c5fd;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(29,78,216,.08);flex-shrink:0;}
.location-node-inner{padding:.6rem .85rem;display:flex;align-items:center;gap:.6rem;}
.location-node-icon{width:34px;height:34px;border-radius:8px;background:#dbeafe;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);font-size:.9rem;}
.location-node-name{font-size:.85rem;font-weight:700;color:var(--accent);line-height:1.2;}
.location-node-sub{font-size:.68rem;color:var(--muted);margin-top:.12rem;}
/* Dropdowns */
.dd-wrap{position:relative;flex-shrink:0;}
.dd-btn{display:flex;align-items:center;gap:.35rem;padding:.36rem .75rem;border:1px solid var(--border);border-radius:7px;background:#fff;font-family:var(--font);font-size:.82rem;font-weight:500;color:var(--text);cursor:pointer;white-space:nowrap;}
.dd-btn:hover{border-color:#94a3b8;}
.dd-btn.active{border-color:var(--accent);color:var(--accent);}
.dd-menu{display:none;flex-direction:column;position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.11);min-width:230px;max-height:340px;z-index:400;overflow:hidden;}
.dd-menu.open{display:flex;}
.dd-head{padding:.55rem .85rem;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;border-bottom:1px solid var(--border);}
.dd-items-scroll{overflow-y:auto;flex:1;}
.dd-item{display:flex;align-items:center;gap:.6rem;padding:.5rem .85rem;cursor:pointer;font-size:.83rem;color:var(--text);}
.dd-item:hover{background:#f8fafc;}
.dd-item.checked{background:#eff6ff;}
.dd-check{width:14px;height:14px;border:1.5px solid #cbd5e1;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--accent);opacity:0;background:#fff;}
.dd-item.checked .dd-check{opacity:1;border-color:var(--accent);background:#eff6ff;}
.dd-item.indeterminate .dd-check{opacity:1;border-color:var(--accent);background:#eff6ff;font-size:0;position:relative;}
.dd-item.indeterminate .dd-check::after{content:'';display:block;width:8px;height:2px;background:var(--accent);border-radius:1px;}
.dd-item.country-group{font-weight:700;background:#f8fafc;border-bottom:1px solid var(--border);}
.dd-item.country-group.checked{background:#dbeafe;}
.dd-country-count{font-size:.7rem;color:#94a3b8;margin-left:auto;padding-right:.25rem;}
.dd-loc-child{padding-left:1.6rem;}
.dd-foot{padding:.5rem .85rem;border-top:1px solid var(--border);display:flex;gap:.5rem;}
.dd-link{font-size:.75rem;font-weight:600;color:var(--accent);cursor:pointer;background:none;border:none;font-family:var(--font);}
.dd-link:hover{text-decoration:underline;}
/* Panels */
#panel-dept,#panel-project{position:fixed;top:56px;right:0;width:340px;height:calc(100vh - 56px);background:var(--surface);border-left:1px solid var(--border);box-shadow:-4px 0 24px rgba(0,0,0,.09);transform:translateX(100%);transition:transform .25s;z-index:200;display:flex;flex-direction:column;overflow:hidden;}
#panel-dept.open,#panel-project.open{transform:translateX(0);}
#panel-detail{position:fixed;top:56px;right:340px;width:320px;height:calc(100vh - 56px);background:#f8faff;border-left:1px solid var(--border);box-shadow:-4px 0 18px rgba(0,0,0,.07);transform:translateX(calc(100% + 340px));transition:transform .25s;z-index:199;display:flex;flex-direction:column;overflow:hidden;}
#panel-detail.open{transform:translateX(0);}
#panel-detail-2{position:fixed;top:56px;right:660px;width:320px;height:calc(100vh - 56px);background:#f4f7ff;border-left:1px solid var(--border);box-shadow:-4px 0 14px rgba(0,0,0,.05);transform:translateX(calc(100% + 660px));transition:transform .25s;z-index:198;display:flex;flex-direction:column;overflow:hidden;}
#panel-detail-2.open{transform:translateX(0);}
.panel-head{padding:1rem 1.1rem .9rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:.5rem;}
.panel-head-left{display:flex;align-items:center;gap:.6rem;flex:1;min-width:0;}
.panel-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:.1rem .3rem;border-radius:5px;}
.panel-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.panel-title-text{font-size:.95rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.panel-subtitle{font-size:.75rem;color:var(--muted);margin-top:.05rem;}
.panel-body{flex:1;overflow-y:auto;}
.p-section{padding:.85rem 1.1rem;border-bottom:1px solid #eef2f8;}
.p-section:last-child{border-bottom:none;}
.p-sec-label{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#9ca3af;margin-bottom:.6rem;}
.p-desc{font-size:.82rem;color:#374151;line-height:1.68;}
.panel-item{display:flex;align-items:center;gap:.6rem;padding:.5rem .4rem;border-radius:7px;cursor:pointer;border-bottom:1px solid #f1f5f9;}
.panel-item:hover{background:#eff6ff;}
.item-badge{font-size:.68rem;font-weight:700;padding:.2rem .5rem;border-radius:5px;background:#1d4ed820;color:var(--accent);white-space:nowrap;flex-shrink:0;}
.item-label{font-size:.82rem;color:var(--text);flex:1;}
.item-count{font-size:.72rem;font-weight:700;padding:.15rem .5rem;border-radius:100px;background:#e0e7ff;color:var(--accent);}
.item-arrow{font-size:.7rem;color:#a5b4fc;}
.rel-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.member-row{display:flex;align-items:center;gap:.6rem;padding:.45rem 0;border-bottom:1px solid #f1f5f9;}
.member-row img{width:30px;height:30px;border-radius:7px;}
.member-row strong{font-size:.82rem;display:block;}
.ev-detail-row{display:flex;gap:.7rem;padding:.35rem 0;font-size:.85rem;color:var(--text);border-bottom:1px solid #f1f5f9;}
.ev-detail-row strong{min-width:100px;color:#475569;font-weight:600;font-size:.82rem;flex-shrink:0;}
.member-row span{font-size:.72rem;color:var(--muted);}
.detail-body{font-size:.82rem;color:#374151;line-height:1.7;}
.ext-link{display:inline-flex;align-items:center;gap:.3rem;font-size:.8rem;color:var(--accent);text-decoration:none;font-weight:600;padding:.35rem .75rem;border:1px solid #bfdbfe;border-radius:7px;margin-top:.75rem;}
.rel-section-icon{width:20px;height:20px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:.75rem;}
#filter-banner{display:none;align-items:center;gap:.55rem;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:.3rem .7rem;font-size:.8rem;font-weight:500;color:#1d4ed8;}
#filter-banner.visible{display:flex;}
#filter-banner .clear-btn{background:none;border:none;cursor:pointer;color:#1d4ed8;font-weight:700;}
.empty-chart{padding:4rem 1rem;text-align:center;color:#9ca3af;font-size:.9rem;max-width:480px;}
.empty-chart strong{display:block;color:#475569;font-size:1.05rem;margin-bottom:.4rem;}
.empty-chart a{color:var(--accent);font-weight:600;text-decoration:none;}
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;z-index:9999;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:14px;width:380px;max-width:90vw;padding:1.4rem 1.5rem;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.modal h2{font-size:1.05rem;font-weight:700;margin-bottom:1rem;}
.modal .field{display:flex;flex-direction:column;gap:.27rem;margin-bottom:.7rem;}
.modal label{font-size:.76rem;font-weight:600;color:#374151;}
.modal input{padding:.45rem .68rem;border:1px solid var(--border);border-radius:7px;font-family:var(--font);font-size:.87rem;}
.modal input:focus{border-color:var(--accent);box-shadow:0 0 0 3px #dbeafe;outline:none;}
.modal-foot{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.1rem;}

.modal-error.visible{display:block;}
