</style>
</head>
<body>

<header>
<div class="brand"><span class="badge">KiKxxl-evroTarget</span><span class="brand-name">Organization Chart</span></div>
<div style="display:flex;gap:.6rem;align-items:center">
<span id="emp-count" style="font-size:.8rem;color:var(--muted)"></span>
<span id="role-tag" class="role-tag" style="display:none"></span>
<span id="user-badge" style="font-size:.78rem;color:var(--muted);background:#f1f5f9;padding:.25rem .6rem;border-radius:6px;display:none"></span>
<button class="btn btn-ghost" id="pwd-btn" style="display:none" onclick="openPwdModal()" title="Change password">🔑</button>
<a href="/admin.html" class="btn btn-primary" id="admin-link" style="display:none">⚙ Manage</a>
<button class="btn btn-ghost" id="logout-btn" style="display:none" onclick="logout()">Sign out</button>
</div>
</header>

<div class="toolbar">
<input id="search" type="text" placeholder="🔍  Search…" autocomplete="off"/>
<button class="btn btn-ghost" id="btn-tree-toggle" onclick="toggleTreeCollapsed()">Collapse all</button>
<div class="dd-wrap" id="dd-dept-wrap"><button class="dd-btn" id="dd-dept-btn" onclick="toggleDD('dept')"><span id="dd-dept-label">Departments</span></button><div class="dd-menu" id="dd-dept-menu"><div class="dd-head">Filter by department</div><div id="dd-dept-items"></div><div class="dd-foot"><button class="dd-link" onclick="ddSelectAll('dept')">All</button><button class="dd-link" onclick="ddSelectNone('dept')">None</button></div></div></div>
<div class="dd-wrap" id="dd-proj-wrap"><button class="dd-btn" id="dd-proj-btn" onclick="toggleDD('proj')"><span id="dd-proj-label">Projects</span></button><div class="dd-menu" id="dd-proj-menu"><div class="dd-head">Filter by client project</div><div id="dd-proj-items"></div><div class="dd-foot"><button class="dd-link" onclick="ddSelectAll('proj')">All</button><button class="dd-link" onclick="ddSelectNone('proj')">None</button></div></div></div>
<div class="dd-wrap" id="dd-loc-wrap"><button class="dd-btn" id="dd-loc-btn" onclick="toggleDD('loc')"><span id="dd-loc-label">Locations</span></button><div class="dd-menu" id="dd-loc-menu"><div class="dd-head">Filter by location</div><div id="dd-loc-items"></div><div class="dd-foot"><button class="dd-link" onclick="ddSelectAll('loc')">All</button><button class="dd-link" onclick="ddSelectNone('loc')">None</button></div></div></div>

<div class="layout-toggle" id="layout-toggle" title="Layout: Auto stacks vertically when many siblings · Horizontal forces side-by-side · Vertical forces stacked">
  <button type="button" data-mode="auto" class="lt-btn active" onclick="setLayoutMode('auto')">Auto</button>
  <button type="button" data-mode="horizontal" class="lt-btn" onclick="setLayoutMode('horizontal')">↔ Horizontal</button>
  <button type="button" data-mode="vertical" class="lt-btn" onclick="setLayoutMode('vertical')">↕ Vertical</button>
</div>
<div id="filter-banner"><span id="filter-label"></span><button class="clear-btn" onclick="clearIsolation()">✕ Show all</button></div>
<span class="hint">Click card to expand · dept badge → info · ◆ chip → project info</span>
</div>

<div class="page"><div id="chart-wrap"><div id="chart"></div></div></div>

<div id="panel-dept"><div class="panel-head"><div class="panel-head-left"><div class="panel-dot" id="dp-dot"></div><div><div class="panel-title-text" id="dp-name"></div><div class="panel-subtitle" id="dp-subtitle"></div></div></div><button class="panel-close" onclick="closeDeptPanel()">✕</button></div><div class="panel-body" id="dp-body"></div></div>
<div id="panel-project"><div class="panel-head"><div class="panel-head-left"><div class="panel-dot" id="pp-dot"></div><div><div class="panel-title-text" id="pp-name"></div><div class="panel-subtitle" id="pp-subtitle"></div></div></div><button class="panel-close" onclick="closeProjectPanel()">✕</button></div><div class="panel-body" id="pp-body"></div></div>
<div id="panel-detail"><div class="panel-head"><div class="panel-head-left"><div class="panel-dot" id="dd-dot" style="display:none"></div><div><div class="panel-title-text" id="dd-title"></div><div class="panel-subtitle" id="dd-subtitle"></div></div></div><button class="panel-close" onclick="closeDetailPanel()">✕</button></div><div class="panel-body" id="dd-body"></div></div>
<div id="panel-detail-2"><div class="panel-head"><div class="panel-head-left"><div class="panel-dot" id="d2-dot" style="display:none"></div><div><div class="panel-title-text" id="d2-title"></div><div class="panel-subtitle" id="d2-subtitle"></div></div></div><button class="panel-close" onclick="closeDetail2Panel()">✕</button></div><div class="panel-body" id="d2-body"></div></div>

<div class="modal-bg" id="pwd-modal">
<div class="modal">
<h2>Change your password</h2>
<div class="field"><label>Current password</label><input id="pwd-current" type="password"/></div>
<div class="field"><label>New password (min. 6 characters)</label><input id="pwd-new" type="password"/></div>
<div class="field"><label>Confirm new password</label><input id="pwd-confirm" type="password"/></div>
<div class="modal-error" id="pwd-error"></div>
<div class="modal-foot"><button class="btn btn-ghost" onclick="closePwdModal()">Cancel</button><button class="btn btn-primary" onclick="submitPwdChange()">Update password</button></div>
</div>
</div>
<div id="toast"></div>

<script>
let allNodes=[],allProjects=[],allDepts=[],allLocs=[],allDivisions=[],countryGroups=[],allDeptsRaw=[];
const APP_VERSION='2026-05-07-v9';
console.log('[OrgChart] Loaded version:',APP_VERSION);
let opsDeptId=null;
let primaryProjectByEmp={},projectChildrenByProj={};
let divisionsByProject={},divisionsByDept={},divisionChildren={};
let deptHeadByDept={},projectHeadByProject={};
let panelFadeDeptId=null,panelFadeProjectId=null; // when set, non-members of this dept/project fade in chart
let expandedCards=new Set(),collapsedTree=new Set();
let isolation=null,currentRole=null,currentUsername=null;
let searchDirectMatches=new Set(),searchAncestorChain=new Set(),searchMatchedProjects=new Set();
let hiddenDepts=new Set(),hiddenProjects=new Set(),hiddenLocs=new Set();
let layoutMode='auto'; // 'auto' | 'horizontal' | 'vertical' — auto stacks vertically when child count is high
const VERTICAL_THRESHOLD=3; // auto mode: 3 or more siblings of equal rank → stack vertically

// ── Per-user view preferences (localStorage, keyed by username) ─────────────
// Only the layout direction (Auto / Horizontal / Vertical) is remembered per
// user. Hidden-dept/project/location filters
// reset on every visit — saving them caused users to come back to a chart
// that looked empty because of stale filters.
function prefKey(){return currentUsername?`orgchart_prefs_${currentUsername}`:null;}
function loadPrefs(){
  const k=prefKey();if(!k) return;
  try{
    const raw=localStorage.getItem(k);if(!raw) return;
    const p=JSON.parse(raw);
    if(p.layoutMode&&['auto','horizontal','vertical'].includes(p.layoutMode)) layoutMode=p.layoutMode;
  }catch(e){/* ignore corrupted prefs */}
}
function savePrefs(){
  const k=prefKey();if(!k) return;
  try{
    localStorage.setItem(k,JSON.stringify({layoutMode}));
  }catch(e){/* ignore quota errors */}
}

// Decide whether a row of N children should render vertically.
// The layoutMode toggle ONLY affects rows directly under:
//   • a department head's card (non-Operations)
//   • a department tile (when no head) — only one such row is rendered, the dept's members
//   • a client project head's card
//   • a client project tile (when no head)
// Every other row in the tree is forced horizontal regardless of layoutMode.
function shouldStackVertically(n){
  if(layoutMode==='vertical') return n>1; // a single child looks the same either way
  if(layoutMode==='horizontal') return false;
  return n>=VERTICAL_THRESHOLD; // auto
}
// Build the className string for a children-row.
// `respectLayoutMode=true` lets the layoutMode toggle apply to this row.
// Default is HORIZONTAL — only specific structural rows opt in.
function rowClass(n,respectLayoutMode){
  let c='children-row';
  if(n>1) c+=' multi';
  if(respectLayoutMode&&shouldStackVertically(n)) c+=' vertical';
  return c;
}
function setLayoutMode(mode){
  if(!['auto','horizontal','vertical'].includes(mode)) return;
  layoutMode=mode;
  document.querySelectorAll('#layout-toggle .lt-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.mode===mode);
  });
  savePrefs();
  renderChart(document.getElementById('search').value.trim()||undefined);
}

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
const LANG_CODE_MAP={'en':'English','de':'German','fr':'French','it':'Italian','es':'Spanish','pt':'Portuguese','nl':'Dutch','sv':'Swedish','no':'Norwegian','da':'Danish','fi':'Finnish','pl':'Polish','cs':'Czech','ro':'Romanian','el':'Greek','tr':'Turkish','ar':'Arabic'};
function normalizeLang(s){const t=s.trim(),m=LANG_CODE_MAP[t.toLowerCase()];return m||t;}
function cssSafe(s){return s.replace(/[^a-z0-9]/gi,'_');}
function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.style.cssText=`position:fixed;bottom:1.5rem;right:1.5rem;padding:.7rem 1.1rem;border-radius:9px;font-size:.84rem;font-weight:500;display:block;z-index:9999;${type==='ok'?'background:#f0fdf4;border:1px solid #86efac;color:#166534;':'background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;'}`;clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',3000);}
async function logout(){await fetch('/auth/logout',{method:'POST'});window.location.href='/login.html';}
function openPwdModal(){document.getElementById('pwd-modal').classList.add('open');['pwd-current','pwd-new','pwd-confirm'].forEach(id=>document.getElementById(id).value='');document.getElementById('pwd-error').classList.remove('visible');document.getElementById('pwd-current').focus();}
function closePwdModal(){document.getElementById('pwd-modal').classList.remove('open');}
async function submitPwdChange(){const cur=document.getElementById('pwd-current').value,nw=document.getElementById('pwd-new').value,cf=document.getElementById('pwd-confirm').value;const err=document.getElementById('pwd-error');err.classList.remove('visible');if(!cur||!nw||!cf){err.textContent='All fields required.';err.classList.add('visible');return;}if(nw.length<6){err.textContent='Min. 6 characters.';err.classList.add('visible');return;}if(nw!==cf){err.textContent='Passwords do not match.';err.classList.add('visible');return;}const r=await fetch('/api/me/password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current_password:cur,new_password:nw})});if(!r.ok){const d=await r.json().catch(()=>({error:'Failed'}));err.textContent=d.error||'Failed';err.classList.add('visible');return;}closePwdModal();toast('Password updated.','ok');}


async function init(){
  try{const res=await fetch('/api/me',{credentials:'same-origin'});if(res.ok){const data=await res.json();if(data&&data.user){currentRole=data.user.role||'viewer';currentUsername=data.user.username||null;document.getElementById('user-badge').textContent=data.user.username;document.getElementById('user-badge').style.display='inline';document.getElementById('logout-btn').style.display='inline-flex';document.getElementById('pwd-btn').style.display='inline-flex';const rt=document.getElementById('role-tag');rt.textContent=currentRole;rt.className='role-tag '+currentRole;rt.style.display='inline-block';if(['editor','admin','developer','superadmin'].includes(currentRole)) document.getElementById('admin-link').style.display='inline-flex';}else{window.location.href='/login.html';return;}}else if(res.status===401){window.location.href='/login.html';return;}else{currentRole='viewer';}}catch(e){currentRole='viewer';}

  // Load this user's saved layout preference (only the layout direction is
  // remembered across sessions). Re-saving overwrites any stale legacy keys
  // that previously stored hidden-filter sets.
  loadPrefs();
  savePrefs();

  const [chart,proj,loc,depts,divs]=await Promise.all([
    fetch('/api/orgchart').then(r=>r.json()),
    fetch('/api/client-projects').then(r=>r.json()).catch(()=>[]),
    fetch('/api/locations').then(r=>r.json()).catch(()=>[]),
    fetch('/api/departments').then(r=>r.json()).catch(()=>[]),
    fetch('/api/divisions').then(r=>r.json()).catch(()=>[]),
  ]);
  allNodes=chart;allProjects=proj;allDivisions=divs;allDeptsRaw=depts;
  allLocs=loc.sort((a,b)=>{const cA=(a.country||'').toLowerCase(),cB=(b.country||'').toLowerCase();if(cA!==cB)return cA.localeCompare(cB);return a.name.localeCompare(b.name);});
  document.getElementById('emp-count').textContent=allNodes.filter(n=>!n.is_virtual).length+' employees';

  const opsDept=depts.find(d=>d.name&&d.name.toLowerCase()==='operations');
  opsDeptId=opsDept?opsDept.id:null;

  // Build project/employee maps
  primaryProjectByEmp={};projectChildrenByProj={};
  allNodes.forEach(n=>{if(!n.projects||!n.projects.length)return;const primary=n.projects.find(p=>p.is_primary)||n.projects[0];primaryProjectByEmp[n.id]=primary.project_id;if(!projectChildrenByProj[primary.project_id]) projectChildrenByProj[primary.project_id]=[];projectChildrenByProj[primary.project_id].push(n.id);});

  // Build head lookups: { deptId -> head_employee_id, projectId -> head_employee_id }
  deptHeadByDept={};projectHeadByProject={};
  depts.forEach(d=>{if(d.head_employee_id) deptHeadByDept[d.id]=d.head_employee_id;});
  proj.forEach(p=>{if(p.head_employee_id) projectHeadByProject[p.id]=p.head_employee_id;});

  // Build division maps (top-level only — parent_division_id IS NULL)
  divisionsByProject={};divisionsByDept={};divisionChildren={};
  allDivisions.forEach(d=>{
    if(d.project_id){if(!divisionsByProject[d.project_id]) divisionsByProject[d.project_id]=[];divisionsByProject[d.project_id].push(d);}
    else if(d.department_id){if(!divisionsByDept[d.department_id]) divisionsByDept[d.department_id]=[];divisionsByDept[d.department_id].push(d);}
  });

  // Note: deep tree starts fully expanded; user can toggle Collapse all via toolbar.
  const dseen=new Map();allNodes.forEach(n=>{if(n.dept_id&&!dseen.has(n.dept_id)) dseen.set(n.dept_id,{id:n.dept_id,name:n.dept,color:n.dept_color});});
  allDepts=[...dseen.values()].sort((a,b)=>a.name.localeCompare(b.name));
  const byCountry=new Map();allLocs.forEach(l=>{const c=(l.country||'').trim();if(!c)return;if(!byCountry.has(c)) byCountry.set(c,[]);byCountry.get(c).push(l.id);});
  countryGroups=[...byCountry.entries()].filter(([_,ids])=>ids.length>=2).map(([country,locIds])=>({country,locIds})).sort((a,b)=>a.country.localeCompare(b.country));
  // Reflect loaded layout pref on the toolbar before the first render
  document.querySelectorAll('#layout-toggle .lt-btn').forEach(b=>{b.classList.toggle('active',b.dataset.mode===layoutMode);});
  // Clear the search input — browsers sometimes autofill it with the username
  document.getElementById('search').value='';
  buildDropdowns();renderChart();
}

function buildDropdowns(){
  document.getElementById('dd-dept-items').innerHTML=allDepts.length===0?`<div style="padding:.85rem;color:#9ca3af;font-size:.78rem;text-align:center">No departments yet.</div>`:`<div class="dd-items-scroll">`+allDepts.map(d=>`<div class="dd-item checked" id="ddi-dept-${d.id}"><div style="width:9px;height:9px;border-radius:50%;background:${d.color}"></div><span style="flex:1">${escapeHtml(d.name)}</span><span class="dd-check">✓</span></div>`).join('')+`</div>`;
  allDepts.forEach(d=>{const el=document.getElementById('ddi-dept-'+d.id);if(el)el.addEventListener('click',()=>toggleDDItem('dept',d.id));});
  document.getElementById('dd-proj-items').innerHTML=allProjects.length===0?`<div style="padding:.85rem;color:#9ca3af;font-size:.78rem;text-align:center">No projects yet.</div>`:`<div class="dd-items-scroll">`+allProjects.map(p=>`<div class="dd-item checked" id="ddi-proj-${p.id}"><span style="color:${p.color};font-size:.75rem">◆</span><span style="flex:1">${escapeHtml(p.name)}</span><span class="dd-check">✓</span></div>`).join('')+`</div>`;
  allProjects.forEach(p=>{const el=document.getElementById('ddi-proj-'+p.id);if(el)el.addEventListener('click',()=>toggleDDItem('proj',p.id));});
  if(allLocs.length===0){document.getElementById('dd-loc-items').innerHTML=`<div style="padding:.85rem;color:#9ca3af;font-size:.78rem;text-align:center">No locations yet.</div>`;}
  else{const grouped=new Set(countryGroups.map(g=>g.country));const seen=new Set();let html='<div class="dd-items-scroll">';allLocs.forEach(l=>{const c=(l.country||'').trim();if(c&&grouped.has(c)&&!seen.has(c)){seen.add(c);const g=countryGroups.find(x=>x.country===c);html+=`<div class="dd-item country-group checked" id="ddi-country-${cssSafe(c)}"><span style="font-size:.85rem">🌐</span><span style="flex:1">${escapeHtml(c)}</span><span class="dd-country-count">${g.locIds.length}</span><span class="dd-check">✓</span></div>`;}const indent=(c&&grouped.has(c))?' dd-loc-child':'';html+=`<div class="dd-item checked${indent}" id="ddi-loc-${l.id}"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span style="flex:1">${escapeHtml(l.name)}${l.country?', '+escapeHtml(l.country):''}</span><span class="dd-check">✓</span></div>`;});html+='</div>';document.getElementById('dd-loc-items').innerHTML=html;allLocs.forEach(l=>{const el=document.getElementById('ddi-loc-'+l.id);if(el)el.addEventListener('click',()=>toggleDDItem('loc',l.id));});countryGroups.forEach(g=>{const el=document.getElementById('ddi-country-'+cssSafe(g.country));if(el)el.addEventListener('click',()=>toggleCountryGroup(g.country));});}
  updateDDLabel('dept');updateDDLabel('proj');updateDDLabel('loc');
}

function toggleDD(type){['dept','proj','loc'].forEach(t=>{if(t!==type){document.getElementById('dd-'+t+'-menu').classList.remove('open');document.getElementById('dd-'+t+'-btn').classList.remove('active');}});document.getElementById('dd-'+type+'-menu').classList.toggle('open');document.getElementById('dd-'+type+'-btn').classList.toggle('active');}
function toggleDDItem(type,id){const h=type==='dept'?hiddenDepts:type==='proj'?hiddenProjects:hiddenLocs;if(h.has(id))h.delete(id);else h.add(id);updateDDLabel(type);renderChart();}
function toggleCountryGroup(country){const g=countryGroups.find(x=>x.country===country);if(!g)return;const any=g.locIds.some(id=>!hiddenLocs.has(id));if(any)g.locIds.forEach(id=>hiddenLocs.add(id));else g.locIds.forEach(id=>hiddenLocs.delete(id));updateDDLabel('loc');renderChart();}
function ddSelectAll(type){const h=type==='dept'?hiddenDepts:type==='proj'?hiddenProjects:hiddenLocs;h.clear();updateDDLabel(type);renderChart();}
function ddSelectNone(type){const all=type==='dept'?allDepts:type==='proj'?allProjects:allLocs;const h=type==='dept'?hiddenDepts:type==='proj'?hiddenProjects:hiddenLocs;all.forEach(d=>h.add(d.id));updateDDLabel(type);renderChart();}
function updateDDLabel(type){const all=type==='dept'?allDepts:type==='proj'?allProjects:allLocs;const hidden=type==='dept'?hiddenDepts:type==='proj'?hiddenProjects:hiddenLocs;const labels={dept:'Departments',proj:'Projects',loc:'Locations'};all.forEach(d=>{const el=document.getElementById('ddi-'+type+'-'+d.id);if(el)el.classList.toggle('checked',!hidden.has(d.id));});if(type==='loc'){countryGroups.forEach(g=>{const el=document.getElementById('ddi-country-'+cssSafe(g.country));if(!el)return;const shown=g.locIds.filter(id=>!hiddenLocs.has(id)).length;el.classList.remove('checked','indeterminate');if(shown===g.locIds.length)el.classList.add('checked');else if(shown>0)el.classList.add('indeterminate');});}const lab=document.getElementById('dd-'+type+'-label'),btn=document.getElementById('dd-'+type+'-btn');if(hidden.size===0){lab.textContent=labels[type];btn.classList.remove('active');}else{lab.textContent=`${all.length-hidden.size}/${all.length} ${labels[type].toLowerCase()}`;btn.classList.add('active');}}
document.addEventListener('click',e=>{['dept','proj','loc'].forEach(t=>{const w=document.getElementById('dd-'+t+'-wrap');if(w&&!w.contains(e.target)){document.getElementById('dd-'+t+'-menu').classList.remove('open');document.getElementById('dd-'+t+'-btn').classList.remove('active');}});});

function getDepth(id,d=0){const n=allNodes.find(x=>x.id===id);if(!n||!n.pid)return d;return getDepth(n.pid,d+1);}
function nodeMatchesLocFilter(n){if(hiddenLocs.size===0)return true;if(!n.location_id)return true;return!hiddenLocs.has(n.location_id);}

// ── Chart rendering ───────────────────────────────────────────────────────────
function renderChart(filterQ){
  const chart=document.getElementById('chart');chart.innerHTML='';
  if(allNodes.length===0){const ed=['editor','admin','developer','superadmin'].includes(currentRole);chart.innerHTML=`<div class="empty-chart"><strong>The org chart is empty</strong>${ed?'Open <a href="/admin.html">⚙ Manage</a> to add departments, employees and projects.':'Ask an editor to add data.'}</div>`;return;}

  // Track which nodes are direct search matches vs their reporting-chain ancestors
  searchDirectMatches=new Set();searchAncestorChain=new Set();searchMatchedProjects=new Set();

  // Determine if a location highlight filter is active
  const locFilterActive=hiddenLocs.size>0;

  let visible=allNodes.filter(n=>{
    if(n.is_virtual)return true;
    if(hiddenDepts.size>0&&n.dept_id&&hiddenDepts.has(n.dept_id))return false;
    if(hiddenProjects.size>0&&n.projects&&n.projects.length>0&&!n.projects.some(p=>!hiddenProjects.has(p.project_id)))return false;
    return true;
  });

  // Location filter — works like search: matching employees full color, ancestors faded, rest hidden
  if(locFilterActive){
    const locMatches=new Set();
    visible.forEach(n=>{
      if(n.is_virtual)return;
      if(n.location_id&&!hiddenLocs.has(n.location_id)) locMatches.add(n.id);
    });
    // Walk up from each match to root via manager chain
    const locChain=new Set(locMatches);
    locMatches.forEach(id=>{
      let n=allNodes.find(x=>x.id===id);
      // Track matched projects so the project subtree renders for these employees
      if(n&&primaryProjectByEmp[n.id]) searchMatchedProjects.add(primaryProjectByEmp[n.id]);
      while(n&&n.pid){locChain.add(n.pid);searchAncestorChain.add(n.pid);n=allNodes.find(x=>x.id===n.pid);}
    });
    locMatches.forEach(id=>searchDirectMatches.add(id));
    visible=visible.filter(n=>n.is_virtual||locChain.has(n.id));
  }

  if(filterQ){
    const lq=filterQ.toLowerCase();
    // Direct matches: employees whose name matches the search query
    visible.filter(n=>n.name.toLowerCase().includes(lq)).forEach(n=>searchDirectMatches.add(n.id));
    // Walk up from each match to root, collecting ancestors via pid chain
    const allInChain=new Set(searchDirectMatches);
    searchDirectMatches.forEach(id=>{
      let n=allNodes.find(x=>x.id===id);
      // If this employee is routed under a project, track it so the project tile stays visible
      if(n&&primaryProjectByEmp[n.id]) searchMatchedProjects.add(primaryProjectByEmp[n.id]);
      // Walk up the manager chain
      while(n&&n.pid){allInChain.add(n.pid);searchAncestorChain.add(n.pid);n=allNodes.find(x=>x.id===n.pid);}
    });
    visible=allNodes.filter(n=>allInChain.has(n.id));
  }

  // Roots — nodes with no manager (or is_virtual with no pid)
  const roots=visible.filter(n=>(n.pid||null)===null);

  if(roots.length===0){chart.innerHTML=`<div class="empty-chart"><strong>Nothing matches your filters.</strong></div>`;return;}

  // If there's a virtual leadership node, render it as the root
  const virtualRoot=roots.find(n=>n.is_virtual);
  if(virtualRoot){
    chart.appendChild(buildVirtualSubtree(virtualRoot,visible,filterQ));
  } else if(roots.length===1){
    chart.appendChild(buildPersonSubtree(roots[0],visible,filterQ));
  } else {
    // Multiple roots — render side by side
    const row=document.createElement('div');row.className=rowClass(roots.length);
    roots.forEach(r=>{const col=document.createElement('div');col.className='child-col';col.appendChild(buildPersonSubtree(r,visible,filterQ));row.appendChild(col);});
    chart.appendChild(row);
  }
}

// ── Virtual (Leadership) node ─────────────────────────────────────────────────
function buildVirtualSubtree(node,visible,filterQ){
  const wrap=document.createElement('div');wrap.className='subtree';
  const card=document.createElement('div');card.className='virtual-node';
  const directChildren=visible.filter(n=>(n.pid||null)===node.id);
  card.innerHTML=`<div class="virtual-node-inner"><div class="virtual-node-icon">⭐</div><div><div class="virtual-node-name">${escapeHtml(node.title||node.name)}</div><div class="virtual-node-sub">${directChildren.length} member${directChildren.length!==1?'s':''}</div></div></div>`;
  wrap.appendChild(card);
  if(directChildren.length>0){
    const conn=document.createElement('div');conn.className='connector-down';wrap.appendChild(conn);
    const cw=document.createElement('div');cw.className='subtree-children';
    const row=document.createElement('div');row.className=rowClass(directChildren.length);
    directChildren.forEach(c=>{const col=document.createElement('div');col.className='child-col';col.appendChild(buildPersonSubtree(c,visible,filterQ));row.appendChild(col);});
    cw.appendChild(row);wrap.appendChild(cw);
  }
  return wrap;
}

// ── Person subtree (with head model + division grouping + collapsed view) ────
//
// Rendering rules (based on user's spec):
//  - In COLLAPSED view: render only down to the next dept-head/dept-tile or
//    project-head/project-tile, never deeper.
//  - In EXPANDED view: render the full hierarchy.
//  - For each direct report: if that report is the head of a department,
//    they are rendered AS that department (no separate dept tile).
//  - For depts with no head: render a department tile as a sibling.
//  - Operations is special — it's always shown as the gateway tile under the CEO.
//  - Inside Operations: each project either renders as the head's person card
//    (when the project has a head) or as the project tile (no head).
//  - Project employees: cards get a double-outline style.
//  - Division grouping: when a person has children belonging to multiple
//    divisions, the children render in clusters by division.
//
function buildPersonSubtree(node,visible,filterQ){
  const wrap=document.createElement('div');wrap.className='subtree';
  wrap.appendChild(buildEmployeeCard(node));

  if(treeCollapsed){
    // In collapsed mode, ONLY the root person renders down to dept heads / Operations.
    // Other people are rendered as leaf cards (no children below).
    if(node.pid||node.is_virtual) return wrap;
    return appendRootCollapsedChildren(wrap,node,visible,filterQ);
  }

  // ── Expanded mode ──
  // Direct reports who are NOT routed under their own primary project
  // UNLESS this node is itself a project member — then children in the same project stay here
  // Also exclude the Operations head (they'll show under the ops subtree gateway)
  const opsHeadId=opsDeptId?deptHeadByDept[opsDeptId]:null;
  const nodeProject=primaryProjectByEmp[node.id]||null;
  const directReports=visible.filter(c=>{
    if((c.pid||null)!==node.id||c.is_virtual) return false;
    if(opsHeadId&&c.id===opsHeadId) return false;
    const childProject=primaryProjectByEmp[c.id];
    if(childProject){
      // Keep if parent is in the same project (they're part of the project hierarchy)
      if(nodeProject&&childProject===nodeProject) return true;
      // Otherwise filter out — they'll render under their project subtree
      return false;
    }
    return true;
  });

  // Operations gateway: show when no search, or when a project employee matched the search
  const opsProjects=opsDeptId?allProjects.filter(p=>(hiddenProjects.size===0||!hiddenProjects.has(p.id))):[];
  const showOpsUnderThisNode=!node.pid&&!node.is_virtual&&opsProjects.length>0&&(searchDirectMatches.size===0||searchMatchedProjects.size>0);

  // Department tiles for departments WITHOUT a head, whose members include any
  // of this person's direct reports. (When a dept has a head, the head's card
  // already represents the dept — no separate tile.)
  const headlessDeptTiles=[];
  const headlessDeptIds=new Set();
  if(!node.pid&&!node.is_virtual&&searchDirectMatches.size===0){
    // Only the CEO/root sees dept tiles for headless depts (the dept-tile-as-fallback rule)
    const seenDepts=new Set();
    directReports.forEach(c=>{
      if(!c.dept_id||c.dept_id===opsDeptId) return;
      if(seenDepts.has(c.dept_id)) return;
      seenDepts.add(c.dept_id);
      // Only show tile if dept has NO head (heads are rendered as themselves)
      if(deptHeadByDept[c.dept_id]) return;
      const count=allNodes.filter(n=>n.dept_id===c.dept_id).length;
      headlessDeptTiles.push({deptId:c.dept_id,name:c.dept,color:c.dept_color,count});
      headlessDeptIds.add(c.dept_id);
    });
  }
  // Filter out direct reports that belong to headless depts — they render under the Vacant card
  const filteredReports=headlessDeptIds.size>0?directReports.filter(c=>!c.dept_id||!headlessDeptIds.has(c.dept_id)):directReports;

  const isCollTree=collapsedTree.has(node.id);
  const totalChildren=filteredReports.length+headlessDeptTiles.length+(showOpsUnderThisNode?1:0);
  const hasChildren=totalChildren>0;

  if(hasChildren&&!isCollTree){
    const conn=document.createElement('div');conn.className='connector-down';wrap.appendChild(conn);
    const cw=document.createElement('div');cw.className='subtree-children';

    // The layoutMode (Auto/Horizontal/Vertical) toggle applies to the row of
    // direct reports under a department head (excluding Operations), under a
    // project head, or under any node within a project hierarchy.
    const isNonOpsDeptHead = (node.dept_id && node.dept_id!==opsDeptId && deptHeadByDept[node.dept_id]===node.id)
      || (primaryProjectByEmp[node.id]); // project members also respect layout

    // Determine if children should be grouped by division
    // (only kicks in when this person has direct reports spanning multiple divisions)
    const grouped=groupChildrenByDivision(filteredReports);

    if(grouped&&grouped.groups.length>1){
      // Division-grouped layout: render each division group as a labeled cluster,
      // headless dept tiles + Operations appended at the end.
      const total=grouped.groups.length+headlessDeptTiles.length+(showOpsUnderThisNode?1:0);
      const row=document.createElement('div');row.className=rowClass(total,isNonOpsDeptHead);
      grouped.groups.forEach(g=>{
        const col=document.createElement('div');col.className='child-col';
        col.appendChild(buildDivisionGroup(g,visible,filterQ));
        row.appendChild(col);
      });
      headlessDeptTiles.forEach(t=>{const col=document.createElement('div');col.className='child-col';col.appendChild(buildDeptSubtree(t,visible,filterQ));row.appendChild(col);});
      if(showOpsUnderThisNode){const col=document.createElement('div');col.className='child-col';col.appendChild(buildOpsSubtree(opsProjects,visible,filterQ));row.appendChild(col);}
      cw.appendChild(row);wrap.appendChild(cw);
    } else {
      // Flat layout: all reports + headless dept tiles + Operations
      const row=document.createElement('div');row.className=rowClass(totalChildren,isNonOpsDeptHead);
      filteredReports.forEach(emp=>{const col=document.createElement('div');col.className='child-col';col.appendChild(buildPersonSubtree(emp,visible,filterQ));row.appendChild(col);});
      headlessDeptTiles.forEach(t=>{const col=document.createElement('div');col.className='child-col';col.appendChild(buildDeptSubtree(t,visible,filterQ));row.appendChild(col);});
      if(showOpsUnderThisNode){const col=document.createElement('div');col.className='child-col';col.appendChild(buildOpsSubtree(opsProjects,visible,filterQ));row.appendChild(col);}
      cw.appendChild(row);wrap.appendChild(cw);
    }
  }

  const tt=wrap.querySelector('.card-tree-toggle');
  if(tt&&!hasChildren) tt.style.display='none';
  return wrap;
}

// Append the collapsed-mode children of the root person:
//  - Each department: head (as their card, recursing not allowed) OR dept tile
//  - Operations tile (always when present), with project heads/tiles below
function appendRootCollapsedChildren(wrap,node,visible,filterQ){
  // Departments with members (excluding Operations)
  const deptCols=[];
  const seenDepts=new Set();
  allNodes.forEach(n=>{
    if(!n.dept_id||n.dept_id===opsDeptId||seenDepts.has(n.dept_id)) return;
    if(hiddenDepts.size>0&&hiddenDepts.has(n.dept_id)) return;
    seenDepts.add(n.dept_id);
    const headId=deptHeadByDept[n.dept_id];
    if(headId){
      const headNode=allNodes.find(x=>x.id===headId);
      if(headNode){
        const col=document.createElement('div');col.className='child-col';
        // Render the head as a leaf card (no children even though they have reports)
        const sub=document.createElement('div');sub.className='subtree';sub.appendChild(buildEmployeeCard(headNode));
        col.appendChild(sub);
        deptCols.push(col);
      }
    } else {
      const count=allNodes.filter(x=>x.dept_id===n.dept_id).length;
      const col=document.createElement('div');col.className='child-col';
      col.appendChild(buildDeptSubtree({deptId:n.dept_id,name:n.dept,color:n.dept_color,count},visible,filterQ));
      deptCols.push(col);
    }
  });

  // Operations + projects — show during search only if a project employee matched
  const allOpsProjects=(opsDeptId)?allProjects.filter(p=>(hiddenProjects.size===0||!hiddenProjects.has(p.id))):[];
  const opsProjects=(searchDirectMatches.size>0&&searchMatchedProjects.size===0)?[]:allOpsProjects;
  let opsCol=null;
  if(opsProjects.length>0){
    opsCol=document.createElement('div');opsCol.className='child-col';
    opsCol.appendChild(buildOpsSubtreeCollapsed(opsProjects,visible,filterQ));
  }

  const total=deptCols.length+(opsCol?1:0);
  if(total===0) return wrap;
  const conn=document.createElement('div');conn.className='connector-down';wrap.appendChild(conn);
  const cw=document.createElement('div');cw.className='subtree-children';
  // Top-level CEO row (depts + Operations) is always horizontal
  const row=document.createElement('div');row.className=rowClass(total);
  deptCols.forEach(c=>row.appendChild(c));
  if(opsCol) row.appendChild(opsCol);
  cw.appendChild(row);wrap.appendChild(cw);
  return wrap;
}

// Operations tile in collapsed mode — projects below are heads or tiles only.
function buildOpsSubtreeCollapsed(projects,visible,filterQ){
  const wrap=document.createElement('div');wrap.className='subtree';
  const opsHead=opsDeptId?deptHeadByDept[opsDeptId]:null;
  const opsHeadNode=opsHead?allNodes.find(n=>n.id===opsHead):null;
  if(opsHeadNode){
    wrap.appendChild(buildEmployeeCard(opsHeadNode));
  } else {
    wrap.appendChild(buildVacantCard({title:'Operations Head',dept:'Operations',deptId:opsDeptId,color:'#0f766e',treeKey:'ops',hasChildren:projects.length>0}));
  }
  if(projects.length===0) return wrap;
  const conn=document.createElement('div');conn.className='connector-down';wrap.appendChild(conn);
  const cw=document.createElement('div');cw.className='subtree-children';
  // Operations → projects row stays horizontal (structural)
  const row=document.createElement('div');row.className=rowClass(projects.length);
  projects.forEach(p=>{
    const col=document.createElement('div');col.className='child-col';
    const headId=projectHeadByProject[p.id];
    if(headId){
      const headNode=allNodes.find(x=>x.id===headId);
      if(headNode){
        const sub=document.createElement('div');sub.className='subtree';sub.appendChild(buildEmployeeCard(headNode));
        col.appendChild(sub);
      } else {
        const sub=document.createElement('div');sub.className='subtree';sub.appendChild(buildProjectTile(p));col.appendChild(sub);
      }
    } else {
      const sub=document.createElement('div');sub.className='subtree';sub.appendChild(buildProjectTile(p));col.appendChild(sub);
    }
    row.appendChild(col);
  });
  cw.appendChild(row);wrap.appendChild(cw);
  return wrap;
}

// Group a list of direct reports by their primary division.
// Returns null if there's no division split (all in one or none have divisions).
// Returns {groups:[{division, employees:[...]}, ...]} if 2+ divisions are represented.
function groupChildrenByDivision(reports){
  if(reports.length<2) return null;
  const buckets=new Map(); // key -> {division, employees}
  let withoutDiv=0;
  reports.forEach(r=>{
    const divs=r.divisions||[];
    if(divs.length===0){withoutDiv++; return;}
    const primary=divs[0]; // primary = first listed
    const k=primary.division_id;
    if(!buckets.has(k)) buckets.set(k,{division:primary,employees:[]});
    buckets.get(k).employees.push(r);
  });
  if(buckets.size<=1) return null; // no real grouping
  const groups=[...buckets.values()].sort((a,b)=>a.division.division_name.localeCompare(b.division.division_name));
  // Add the "no division" group at the end if there are uncategorized reports
  if(withoutDiv>0){
    groups.push({division:{division_id:null,division_name:'Other',division_color:'#94a3b8'},employees:reports.filter(r=>!r.divisions||r.divisions.length===0)});
  }
  return {groups};
}

// Render a division group: a small label header + the employees clustered.
function buildDivisionGroup(group,visible,filterQ){
  const wrap=document.createElement('div');wrap.className='subtree division-group';
  const color=group.division.division_color||'#6366f1';
  const head=document.createElement('div');head.className='division-group-head';
  head.style.borderColor=color;head.style.color=color;
  head.innerHTML=`<span class="division-group-dot" style="background:${color}"></span>${escapeHtml(group.division.division_name)}<span class="division-group-count">${group.employees.length}</span>`;
  wrap.appendChild(head);
  const conn=document.createElement('div');conn.className='connector-down';wrap.appendChild(conn);
  const cw=document.createElement('div');cw.className='subtree-children';
  const row=document.createElement('div');row.className=rowClass(group.employees.length);
  group.employees.forEach(emp=>{const col=document.createElement('div');col.className='child-col';col.appendChild(buildPersonSubtree(emp,visible,filterQ));row.appendChild(col);});
  cw.appendChild(row);wrap.appendChild(cw);
  return wrap;
}

// ── Vacant card (shown when a dept or project has no head appointed) ──────────
// Matches buildEmployeeCard exactly: same .node-card structure, same expand
// toggle, same tree toggle (show/hide reports). Avatar is a solid block of the
// department colour. Name reads "Vacant"; title shows the expected position.
function buildVacantCard(opts){
  // opts: {title, dept, deptId, color, treeKey, hasChildren, faded, projectChip}
  const color=opts.color||'#2563eb';
  const treeKey=opts.treeKey||null; // e.g. 'ops' or 'proj:5' for collapsedTree
  const isExpanded=false; // vacant cards are never expanded (no contact detail)
  const hasKids=!!opts.hasChildren;
  const showTreeToggle=hasKids&&!treeCollapsed;

  const card=document.createElement('div');
  // Apply fading logic identical to buildEmployeeCard
  let extraClasses='';
  if(opts.faded) extraClasses+=' faded';
  if(panelFadeDeptId&&opts.deptId&&opts.deptId!==panelFadeDeptId) extraClasses+=' faded';
  if(panelFadeProjectId){
    // Vacant cards are never "on" a project unless they have a projectChip
    if(opts.projectChip){
      if(opts.projectChip.id!==panelFadeProjectId) extraClasses+=' faded';
    } else {
      extraClasses+=' faded';
    }
  }
  if(searchDirectMatches.size>0&&!opts.faded) extraClasses+=' faded';
  card.className='node-card'+extraClasses;

  // Solid-colour avatar with no text (just the dept colour fill)
  const av=`https://ui-avatars.com/api/?name=+&background=${color.replace('#','')}&color=${color.replace('#','')}&size=256`;

  let deptBadge='';
  if(opts.dept&&opts.deptId){
    deptBadge=`<button class="card-dept" style="background:${color}18;color:${color}" data-dept-id="${opts.deptId}" data-color="${color}">${escapeHtml(opts.dept)}</button>`;
  }

  let projChipHtml='';
  if(opts.projectChip){
    projChipHtml=`<div class="proj-chips"><span class="proj-chip primary" style="background:${color}" data-proj-id="${opts.projectChip.id}">◆ ${escapeHtml(opts.projectChip.name)}</span></div>`;
  }

  card.innerHTML=`
    <div class="card-stripe" style="background:${color}"></div>
    <div class="card-header">
      <img class="card-avatar" src="${av}" alt="Vacant"/>
      <div class="card-text">
        <div class="card-title">${escapeHtml(opts.title||'')}</div>
        ${deptBadge}
        <div class="card-name" style="color:#9ca3af;font-style:italic">Vacant</div>
        ${projChipHtml}
      </div>
    </div>
    <div class="card-detail"><div class="card-detail-inner">
      <div class="d-label">Status</div>
      <div class="d-row" style="color:#9ca3af">This position is currently unassigned.</div>
    </div></div>
    <div class="card-expand-toggle"><i class="arrow">▼</i><span>expand profile</span></div>
    ${showTreeToggle&&treeKey?`<div class="card-tree-toggle">${collapsedTree.has(treeKey)?'＋ show reports':'－ hide reports'}</div>`:''}
  `;

  // Expand toggle (shows the "This position is unassigned" detail)
  const vacantExpandKey='vacant:'+(opts.treeKey||opts.deptId||'');
  card.querySelector('.card-header').addEventListener('click',(e)=>{
    if(e.target.closest('.card-dept')||e.target.closest('.proj-chip'))return;
    card.classList.toggle('expanded');
    const sp=card.querySelector('.card-expand-toggle span');
    if(sp) sp.textContent=card.classList.contains('expanded')?'collapse profile':'expand profile';
  });
  card.querySelector('.card-expand-toggle').addEventListener('click',()=>{
    card.classList.toggle('expanded');
    const sp=card.querySelector('.card-expand-toggle span');
    if(sp) sp.textContent=card.classList.contains('expanded')?'collapse profile':'expand profile';
  });

  // Dept badge click
  card.querySelectorAll('.card-dept').forEach(db=>{
    db.addEventListener('click',(e)=>{
      e.stopPropagation();
      if(db.dataset.deptId) openDeptPanelById(parseInt(db.dataset.deptId),db.dataset.color);
    });
  });

  // Project chip click
  card.querySelectorAll('.proj-chip').forEach(c=>c.addEventListener('click',(e)=>{e.stopPropagation();if(c.dataset.projId)openProjectPanel(parseInt(c.dataset.projId));}));

  // Tree toggle
  if(showTreeToggle&&treeKey){
    const tt=card.querySelector('.card-tree-toggle');
    if(tt) tt.addEventListener('click',(e)=>{e.stopPropagation();toggleTree(treeKey);});
  }

  return card;
}

// ── Department subtree (shown when the dept has no head) ─────────────────────
// Renders a "Vacant" card with the department's members grouped beneath it,
// just like Operations does with projects. Supports expand/collapse.
function buildDeptSubtree(group,visible,filterQ){
  const wrap=document.createElement('div');wrap.className='subtree';
  const color=group.color||'#2563eb';
  const deptNameLower=(group.name||'').toLowerCase();
  let posTitle;
  if(deptNameLower==='operations') posTitle='Operations Head';
  else if(deptNameLower==='human resources'||deptNameLower==='hr') posTitle='HR Head';
  else if(deptNameLower==='learning & development'||deptNameLower==='l&d') posTitle='L&D Head';
  else posTitle=group.name+' Head';

  // Find department members who are in the visible set and whose manager is the
  // root node (CEO) or who have no manager — these are "top-level" dept members.
  // We show them as children of the vacant card.
  const deptMembers=visible.filter(n=>n.dept_id===group.deptId&&!n.is_virtual);
  // Top-level members: those whose manager is NOT another dept member (or is the root/CEO)
  const deptMemberIds=new Set(deptMembers.map(n=>n.id));
  const topLevel=deptMembers.filter(n=>!n.pid||!deptMemberIds.has(n.pid));

  const treeKey='dept:'+group.deptId;
  const card=buildVacantCard({title:posTitle,dept:group.name,deptId:group.deptId,color,treeKey,hasChildren:topLevel.length>0});
  wrap.appendChild(card);

  const isCollTree=collapsedTree.has(treeKey);
  if(topLevel.length>0&&!isCollTree){
    const conn=document.createElement('div');conn.className='connector-down';wrap.appendChild(conn);
    const cw=document.createElement('div');cw.className='subtree-children';
    const isNonOpsDeptHead=true; // respect layoutMode for dept children
    const grouped=groupChildrenByDivision(topLevel);
    if(grouped&&grouped.groups.length>1){
      const row=document.createElement('div');row.className=rowClass(grouped.groups.length,isNonOpsDeptHead);
      grouped.groups.forEach(g=>{const col=document.createElement('div');col.className='child-col';col.appendChild(buildDivisionGroup(g,visible,filterQ));row.appendChild(col);});
      cw.appendChild(row);
    } else {
      const row=document.createElement('div');row.className=rowClass(topLevel.length,isNonOpsDeptHead);
      topLevel.forEach(emp=>{const col=document.createElement('div');col.className='child-col';col.appendChild(buildPersonSubtree(emp,visible,filterQ));row.appendChild(col);});
      cw.appendChild(row);
    }
    wrap.appendChild(cw);
  }
  return wrap;
}

// ── Operations gateway (expanded mode) — projects route through this tile ────
// Operations now renders as a "Vacant Operations Head" card (same visual as
// other department head cards) when no head is appointed.
function buildOpsSubtree(projects,visible,filterQ){
  const wrap=document.createElement('div');wrap.className='subtree';
  const visibleProjects=searchMatchedProjects.size>0?projects.filter(p=>searchMatchedProjects.has(p.id)):projects;

  const opsHead=opsDeptId?deptHeadByDept[opsDeptId]:null;
  const opsHeadNode=opsHead?allNodes.find(n=>n.id===opsHead):null;

  let topCard;
  if(opsHeadNode){
    topCard=buildEmployeeCard(opsHeadNode);
  } else {
    const isFaded=searchDirectMatches.size>0;
    topCard=buildVacantCard({title:'Operations Head',dept:'Operations',deptId:opsDeptId,color:'#0f766e',treeKey:'ops',hasChildren:visibleProjects.length>0,faded:isFaded});
  }
  wrap.appendChild(topCard);

  const isCollTree=collapsedTree.has('ops');
  if(visibleProjects.length>0&&!isCollTree){
    const conn=document.createElement('div');conn.className='connector-down';wrap.appendChild(conn);
    const cw=document.createElement('div');cw.className='subtree-children';
    const row=document.createElement('div');row.className=rowClass(visibleProjects.length);
    visibleProjects.forEach(p=>{
      const col=document.createElement('div');col.className='child-col';
      col.appendChild(buildProjectSubtree(p,visible,filterQ));
      row.appendChild(col);
    });
    cw.appendChild(row);wrap.appendChild(cw);
  }
  return wrap;
}

// Plain project tile (used when project has no head) — now renders as a
// "Vacant" card with a "Project Manager" title so it matches the employee-card style.
function buildProjectTile(project){
  const color=project.color||'#0f766e';
  const isFaded=searchDirectMatches.size>0&&!(projectChildrenByProj[project.id]||[]).some(eid=>searchDirectMatches.has(eid));
  const projEmps=projectChildrenByProj[project.id]||[];
  const card=buildVacantCard({title:project.name+' Head',dept:null,deptId:null,color,treeKey:'proj:'+project.id,hasChildren:projEmps.length>0,faded:isFaded,projectChip:{id:project.id,name:project.name}});
  return card;
}

// ── Project subtree (expanded mode) ──────────────────────────────────────────
// If project has a head: render the head's card + their team beneath them.
// If project has no head: render the project tile + members directly.
// In either case, project members get the double-outline visual style.
function buildProjectSubtree(project,visible,filterQ){
  const wrap=document.createElement('div');wrap.className='subtree';
  const headId=projectHeadByProject[project.id];
  const headNode=headId?allNodes.find(n=>n.id===headId):null;

  const allProjEmpIds=projectChildrenByProj[project.id]||[];
  const projEmps=allProjEmpIds.map(id=>allNodes.find(n=>n.id===id)).filter(Boolean).filter(e=>visible.find(n=>n.id===e.id)&&nodeMatchesLocFilter(e));
  const isCollTree=collapsedTree.has('proj:'+project.id);

  if(headNode){
    // Head replaces the tile; render head's card and recurse into THEIR direct reports
    wrap.appendChild(buildEmployeeCard(headNode));
    if(isCollTree) return wrap;

    // Direct reports of the head who are also project members
    const directReports=projEmps.filter(e=>e.id!==headNode.id&&(e.pid||null)===headNode.id);
    if(directReports.length===0) return wrap;

    const conn=document.createElement('div');conn.className='connector-down';wrap.appendChild(conn);
    const cw=document.createElement('div');cw.className='subtree-children';
    // Row directly under a project head respects the layoutMode toggle
    const grouped=groupChildrenByDivision(directReports);
    if(grouped&&grouped.groups.length>1){
      const row=document.createElement('div');row.className=rowClass(grouped.groups.length,true);
      grouped.groups.forEach(g=>{const col=document.createElement('div');col.className='child-col';col.appendChild(buildDivisionGroup(g,visible,filterQ));row.appendChild(col);});
      cw.appendChild(row);
    } else {
      const row=document.createElement('div');row.className=rowClass(directReports.length,true);
      directReports.forEach(emp=>{const col=document.createElement('div');col.className='child-col';col.appendChild(buildPersonSubtree(emp,visible,filterQ));row.appendChild(col);});
      cw.appendChild(row);
    }
    wrap.appendChild(cw);
    return wrap;
  }

  // No head — render the project tile
  wrap.appendChild(buildProjectTile(project));
  if(isCollTree||projEmps.length===0) return wrap;

  // Top-level project members (those whose manager isn't another project member)
  const projEmpIds=new Set(projEmps.map(e=>e.id));
  const topLevel=projEmps.filter(e=>!e.pid||!projEmpIds.has(e.pid));
  if(topLevel.length===0) return wrap;

  const conn=document.createElement('div');conn.className='connector-down';wrap.appendChild(conn);
  const cw=document.createElement('div');cw.className='subtree-children';
  // Row directly under a project tile (no head) respects the layoutMode toggle
  const grouped=groupChildrenByDivision(topLevel);
  if(grouped&&grouped.groups.length>1){
    const row=document.createElement('div');row.className=rowClass(grouped.groups.length,true);
    grouped.groups.forEach(g=>{const col=document.createElement('div');col.className='child-col';col.appendChild(buildDivisionGroup(g,visible,filterQ));row.appendChild(col);});
    cw.appendChild(row);
  } else {
    const row=document.createElement('div');row.className=rowClass(topLevel.length,true);
    topLevel.forEach(emp=>{const col=document.createElement('div');col.className='child-col';col.appendChild(buildPersonSubtree(emp,visible,filterQ));row.appendChild(col);});
    cw.appendChild(row);
  }
  wrap.appendChild(cw);
  return wrap;
}

// ── Employee card ─────────────────────────────────────────────────────────────
function buildEmployeeCard(node){
  const color=node.dept_color||'#1d4ed8';const isExpanded=expandedCards.has(node.id);

  // Apply CSS classes for visual states:
  //  - .project-employee: double-outline style (employees whose primary position is project-based)
  //  - .faded: when a dept/project panel is open and this person isn't a member,
  //            OR when searching and this person is an ancestor in the reporting chain (not a direct match)
  let extraClasses='';
  if(node.is_project_employee||primaryProjectByEmp[node.id]) extraClasses+=' project-employee';
  if(panelFadeDeptId&&node.dept_id!==panelFadeDeptId) extraClasses+=' faded';
  if(panelFadeProjectId){
    const onProj=(node.projects||[]).some(p=>p.project_id===panelFadeProjectId);
    if(!onProj) extraClasses+=' faded';
  }
  // Search: ancestor-chain nodes are faded, direct matches are full color
  if(searchDirectMatches.size>0&&!searchDirectMatches.has(node.id)&&searchAncestorChain.has(node.id)) extraClasses+=' faded';

  const card=document.createElement('div');card.className='node-card'+(isExpanded?' expanded':'')+extraClasses;card.dataset.id=node.id;
  const av=`https://ui-avatars.com/api/?name=${encodeURIComponent(node.name)}&background=${color.replace('#','')}&color=fff&size=256&bold=true&font-size=0.4`;
  const hire=node.hire_date?(()=>{const d=new Date(node.hire_date),y=Math.floor((Date.now()-d)/(365.25*24*3600*1000));return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+` · ${y} yr`;})():null;
  const emails=Array.isArray(node.emails)?node.emails:[];const primary=emails.find(e=>e.is_primary)||emails[0]||null;const others=emails.filter(e=>e!==primary);

  // Build the dept badge. If person is head of a dept, show "Head of X" prefix.
  let dept='';
  if(node.dept&&node.dept_id){
    const headOf=node.head_of_dept_id===node.dept_id?'Head of ':'';
    dept=`<button class="card-dept" style="background:${color}18;color:${color}" data-dept-id="${node.dept_id}" data-color="${color}">${headOf}${escapeHtml(node.dept)}</button>`;
  }
  // If person is head of a project (and the position points to a project), show that too
  if(node.head_of_project_id){
    const proj=allProjects.find(p=>p.id===node.head_of_project_id);
    if(proj){
      const pcolor=proj.color||'#0f766e';
      dept+=`<button class="card-dept" style="background:${pcolor}18;color:${pcolor};margin-left:.3rem" data-proj-id="${proj.id}">Head of ${escapeHtml(proj.name)}</button>`;
    }
  }

  // Division names go on a single line directly under the dept badge
  const divLine=(node.divisions||[]).length>0
    ? `<div class="card-div-line">${(node.divisions||[]).map(d=>`<span class="div-name" style="color:${d.division_color||'#6366f1'}">${escapeHtml(d.division_name)}</span>`).join('<span class="div-sep">·</span>')}</div>`
    : '';

  const projChips=(node.projects||[]).map(p=>`<span class="proj-chip${p.is_primary?' primary':''}" data-proj-id="${p.project_id}">◆ ${escapeHtml(p.project_name)}</span>`).join('');

  // Check for children (for tree toggle)
  const hasDirectKids=allNodes.some(c=>(c.pid||null)===node.id&&!c.is_virtual&&!primaryProjectByEmp[c.id]);
  const showTreeToggle=hasDirectKids&&!treeCollapsed;

  card.innerHTML=`
    <div class="card-stripe" style="background:${color}"></div>
    <div class="card-header">
      <img class="card-avatar" src="${av}" alt="${escapeHtml(node.name)}"/>
      <div class="card-text">
        <div class="card-title">${escapeHtml(node.title||'—')}</div>
        ${dept}
        ${divLine}
        <div class="card-name">${escapeHtml(node.name)}</div>
        ${node.location_name?`<div class="loc-tag">📍 ${escapeHtml(node.location_name)}</div>`:''}
        ${projChips?`<div class="proj-chips">${projChips}</div>`:''}
      </div>
    </div>
    <div class="card-detail"><div class="card-detail-inner">
      ${(primary||node.phone||node.location_name||hire)?`<div class="d-label">Contact & Info</div>
        ${primary?`<div class="d-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><a href="mailto:${primary.email}">${escapeHtml(primary.email)}</a>${primary.label?`<span class="email-label">${escapeHtml(primary.label)}</span>`:''}</div>`:''}
        ${others.map(e=>`<div class="email-extra"><a href="mailto:${e.email}">${escapeHtml(e.email)}</a>${e.label?`<span class="email-label">${escapeHtml(e.label)}</span>`:''}</div>`).join('')}
        ${node.phone?`<div class="d-row">📞 ${escapeHtml(node.phone)}</div>`:''}
        ${node.location_name?`<div class="d-row">📍 ${escapeHtml(node.location_name)}${node.location_country?', '+escapeHtml(node.location_country):''}</div>`:''}
        ${hire?`<div class="d-row">📅 ${hire}</div>`:''}
      `:''}
      ${node.bio?`<div class="d-label">About</div><div class="d-bio">${escapeHtml(node.bio)}</div>`:''}
      ${node.position_description?`<div class="d-label">Job Description</div><div class="d-bio">${escapeHtml(node.position_description)}</div>`:''}
    </div></div>
    <div class="card-expand-toggle"><i class="arrow">▼</i><span>${isExpanded?'collapse profile':'expand profile'}</span></div>
    ${showTreeToggle?`<div class="card-tree-toggle">${collapsedTree.has(node.id)?'＋ show reports':'－ hide reports'}</div>`:''}
  `;

  card.querySelector('.card-header').addEventListener('click',(e)=>{if(e.target.closest('.card-dept')||e.target.closest('.proj-chip'))return;toggleCard(node.id);});
  card.querySelector('.card-expand-toggle').addEventListener('click',()=>toggleCard(node.id));
  card.querySelectorAll('.card-dept').forEach(db=>{
    db.addEventListener('click',(e)=>{
      e.stopPropagation();
      if(db.dataset.deptId) openDeptPanelById(parseInt(db.dataset.deptId),db.dataset.color);
      else if(db.dataset.projId) openProjectPanel(parseInt(db.dataset.projId));
    });
  });
  card.querySelectorAll('.proj-chip').forEach(c=>c.addEventListener('click',(e)=>{e.stopPropagation();openProjectPanel(parseInt(c.dataset.projId));}));
  const tt=card.querySelector('.card-tree-toggle');if(tt) tt.addEventListener('click',(e)=>{e.stopPropagation();toggleTree(node.id);});
  return card;
}

function toggleCard(id){if(expandedCards.has(id))expandedCards.delete(id);else expandedCards.add(id);renderChart(document.getElementById('search').value.trim()||undefined);}
function toggleTree(id){if(collapsedTree.has(id))collapsedTree.delete(id);else collapsedTree.add(id);renderChart(document.getElementById('search').value.trim()||undefined);}

async function openStandardDetail(stdId, scopeOverride, fromDeptId){
  const s=await fetch(`/api/standards/${stdId}`).then(r=>r.ok?r.json():null).catch(()=>null);
  if(!s) return;
  document.getElementById('dd-dot').style.display='block';
  document.getElementById('dd-dot').style.background='#1d4ed8';
  document.getElementById('dd-title').textContent=s.code;
  document.getElementById('dd-subtitle').textContent=s.full_name;
  let html='';
  // General description
  if(s.description){html+=`<div class="p-section"><div class="p-sec-label">Overview</div><p style="font-size:.85rem;color:var(--text);line-height:1.65;white-space:pre-wrap">${escapeHtml(s.description)}</p></div>`;}
  if(s.url) html+=`<div class="p-section"><div class="p-sec-label">Reference</div><a href="${escapeHtml(s.url)}" target="_blank" style="font-size:.82rem;color:#1d4ed8;word-break:break-all">${escapeHtml(s.url)}</a></div>`;
  // Scope for this context (passed from the dept/project panel)
  if(scopeOverride) html+=`<div class="p-section"><div class="p-sec-label">Applicable Scope</div><p style="font-size:.85rem;color:var(--text);line-height:1.65;white-space:pre-wrap">${escapeHtml(scopeOverride)}</p></div>`;
  // Department-specific clause entries (free-text clause+comment rows)
  if(fromDeptId){
    try{
      const entries=await fetch(`/api/departments/${fromDeptId}/standards/${stdId}/entries`).then(r=>r.json());
      if(entries&&entries.length){
        html+=`<div class="p-section"><div class="p-sec-label">Applicable Clauses</div>`;
        entries.forEach(e=>{
          html+=`<div class="panel-item" style="flex-direction:column;align-items:flex-start;gap:.1rem">
            <div style="display:flex;align-items:flex-start;gap:.35rem;width:100%">
              <span style="font-size:.82rem;font-weight:600;color:#1e40af;flex:1">${escapeHtml(e.clause_text)}</span>
            </div>
            ${e.comment?`<div style="font-size:.75rem;color:#475569;margin-left:.1rem;line-height:1.5;margin-top:.15rem">${escapeHtml(e.comment)}</div>`:''}
          </div>`;
        });
        html+=`</div>`;
      }
    }catch(err){console.warn('Could not load dept entries',err);}
  }
  // Which departments use this standard
  if(s.departments&&s.departments.length){html+=`<div class="p-section"><div class="p-sec-label">Departments</div>`;s.departments.forEach(d=>{html+=`<div class="panel-item" onclick="openDeptPanelById(${d.id},'${d.color||'#2563eb'}')" style="flex-direction:column;align-items:flex-start;gap:.1rem"><div style="display:flex;align-items:center;gap:.35rem"><span style="width:8px;height:8px;border-radius:50%;background:${d.color||'#2563eb'}"></span><span class="item-label">${escapeHtml(d.name)}</span></div>${d.scope?`<div style="font-size:.73rem;color:var(--muted);line-height:1.35;padding-left:1.2rem">${escapeHtml(d.scope)}</div>`:''}</div>`;});html+=`</div>`;}
  // Which projects use this standard
  if(s.projects&&s.projects.length){html+=`<div class="p-section"><div class="p-sec-label">Client Projects</div>`;s.projects.forEach(p=>{html+=`<div class="panel-item" onclick="openProjectPanel(${p.id})" style="flex-direction:column;align-items:flex-start;gap:.1rem"><div style="display:flex;align-items:center;gap:.35rem"><span style="width:8px;height:8px;border-radius:50%;background:${p.color||'#0f766e'}"></span><span class="item-label">${escapeHtml(p.name)}</span></div>${p.scope?`<div style="font-size:.73rem;color:var(--muted);line-height:1.35;padding-left:1.2rem">${escapeHtml(p.scope)}</div>`:''}</div>`;});html+=`</div>`;}
  document.getElementById('dd-body').innerHTML=html;
  document.getElementById('panel-detail').classList.add('open');
}

async function openPositionDetail(posId){
  const pos=await fetch(`/api/positions/${posId}`).then(r=>r.ok?r.json():null).catch(()=>null);
  if(!pos){toast('Could not load position.','err');return;}
  const dept=pos.department_id?allDepts.find(d=>d.id===pos.department_id):null;
  const color=dept?dept.color:'#2563eb';
  document.getElementById('dd-dot').style.display='block';
  document.getElementById('dd-dot').style.background=color;
  document.getElementById('dd-title').textContent=pos.title;
  document.getElementById('dd-subtitle').textContent=dept?dept.name:'No department';
  let html='<div class="p-section">';
  html+=`<div class="ev-detail-row"><strong>Holders</strong><span>${pos.headcount||0} employee${pos.headcount!==1?'s':''}</span></div>`;
  if(dept) html+=`<div class="ev-detail-row"><strong>Department</strong><span style="display:flex;align-items:center;gap:.3rem"><span style="width:8px;height:8px;border-radius:50%;background:${color}"></span>${escapeHtml(dept.name)}</span></div>`;
  if(pos.project_id){const proj=allProjects.find(p=>p.id===pos.project_id);if(proj) html+=`<div class="ev-detail-row"><strong>Project</strong><span>◆ ${escapeHtml(proj.name)}</span></div>`;}
  html+='</div>';
  // List holders
  const holders=allNodes.filter(n=>n.position_id===posId);
  if(holders.length){html+=`<div class="p-section"><div class="p-sec-label">Employees in this role</div>`;holders.forEach(h=>{const c=(h.dept_color||color).replace('#','');const a=`https://ui-avatars.com/api/?name=${encodeURIComponent(h.name)}&background=${c}&color=fff&size=80&bold=true&font-size=0.4`;html+=`<div class="member-row" onclick="openEmployeeDetail(${h.id})" style="cursor:pointer"><img src="${a}"/><div><strong>${escapeHtml(h.name)}</strong><span>${escapeHtml(h.title||'')}</span></div><span class="item-arrow" style="margin-left:auto">›</span></div>`;});html+=`</div>`;}
  document.getElementById('dd-body').innerHTML=html;
  document.getElementById('panel-detail').classList.add('open');
}

async function openEmployeeDetail(empId){
  const emp=allNodes.find(n=>n.id===empId);
  if(!emp){toast('Employee not found.','err');return;}
  closeDetail2Panel();
  const color=(emp.dept_color||'#2563eb').replace('#','');
  const a=`https://ui-avatars.com/api/?name=${encodeURIComponent(emp.name)}&background=${color}&color=fff&size=256&bold=true&font-size=0.4`;
  document.getElementById('dd-dot').style.display='none';
  document.getElementById('dd-title').textContent=emp.name;
  document.getElementById('dd-subtitle').textContent=emp.title||'No position';
  let html=`<div style="text-align:center;margin-bottom:1rem"><img src="${a}" style="width:64px;height:64px;border-radius:14px"/></div>`;
  html+='<div class="p-section"><div class="p-sec-label">Details</div>';
  if(emp.title&&emp.position_id) html+=`<div class="panel-item" onclick="openPositionDetail2(${emp.position_id})" style="cursor:pointer"><span class="item-label">${escapeHtml(emp.title)}</span><span class="item-arrow">\u203a</span></div>`;
  else if(emp.title) html+=`<div class="ev-detail-row"><strong>Position</strong><span>${escapeHtml(emp.title)}</span></div>`;
  if(emp.dept) html+=`<div class="ev-detail-row"><strong>Department</strong><span style="display:flex;align-items:center;gap:.3rem"><span style="width:8px;height:8px;border-radius:50%;background:#${color}"></span>${escapeHtml(emp.dept)}</span></div>`;
  const mgr=emp.pid?allNodes.find(n=>n.id===emp.pid):null;
  if(mgr) html+=`<div class="ev-detail-row"><strong>Reports to</strong><span>${escapeHtml(mgr.name)}</span></div>`;
  if(emp.location_name) html+=`<div class="ev-detail-row"><strong>Location</strong><span>${escapeHtml(emp.location_name)}${emp.location_country?', '+escapeHtml(emp.location_country):''}</span></div>`;
  if(emp.hire_date) html+=`<div class="ev-detail-row"><strong>Hire Date</strong><span>${escapeHtml(emp.hire_date)}</span></div>`;
  const emails=Array.isArray(emp.emails)?emp.emails:[];
  emails.forEach(e=>{html+=`<div class="ev-detail-row"><strong>${escapeHtml(e.label||'Email')}${e.is_primary?' \u2605':''}</strong><span>${escapeHtml(e.email)}</span></div>`;});
  if(emp.phone) html+=`<div class="ev-detail-row"><strong>Phone</strong><span>${escapeHtml(emp.phone)}</span></div>`;
  html+='</div>';
  if(emp.projects&&emp.projects.length){html+=`<div class="p-section"><div class="p-sec-label">Project Assignments</div>`;emp.projects.forEach(p=>{const proj=allProjects.find(x=>x.id===p.project_id);html+=`<div class="panel-item" onclick="openProjectPanel(${p.project_id})"><div class="rel-dot" style="background:${proj?proj.color:'#0f766e'}"></div><span class="item-label">\u25c6 ${escapeHtml(proj?proj.name:'Project')}${p.role_on_project?' \u2014 '+escapeHtml(p.role_on_project):''}</span><span class="item-arrow">\u203a</span></div>`;});html+=`</div>`;}
  if(emp.bio) html+=`<div class="p-section"><div class="p-sec-label">About</div><p style="font-size:.85rem;color:var(--text);line-height:1.65;white-space:pre-wrap">${escapeHtml(emp.bio)}</p></div>`;
  // Personal background
  if(emp.education||emp.experience){
    html+=`<div class="p-section"><div class="p-sec-label">Background</div>`;
    if(emp.education) html+=`<div style="margin-bottom:.6rem"><strong style="font-size:.78rem;color:#475569;display:block;margin-bottom:.2rem">Education</strong><p style="font-size:.85rem;color:var(--text);line-height:1.65;white-space:pre-wrap;margin:0">${escapeHtml(emp.education)}</p></div>`;
    if(emp.experience) html+=`<div><strong style="font-size:.78rem;color:#475569;display:block;margin-bottom:.2rem">Past Experience</strong><p style="font-size:.85rem;color:var(--text);line-height:1.65;white-space:pre-wrap;margin:0">${escapeHtml(emp.experience)}</p></div>`;
    html+=`</div>`;
  }
  document.getElementById('dd-body').innerHTML=html;
  document.getElementById('panel-detail').classList.add('open');
}

  if(holders.length){html+=`<div class="p-section"><div class="p-sec-label">Employees</div>`;holders.forEach(h=>{const c=(h.dept_color||color).replace('#','');const a=`https://ui-avatars.com/api/?name=${encodeURIComponent(h.name)}&background=${c}&color=fff&size=80&bold=true&font-size=0.4`;html+=`<div class="member-row"><img src="${a}"/><div><strong>${escapeHtml(h.name)}</strong><span>${escapeHtml(h.title||'')}</span></div></div>`;});html+=`</div>`;}

function closeDetail2Panel(){document.getElementById('panel-detail-2').classList.remove('open');}

// Single Collapse/Expand toggle
let treeCollapsed=false;
function toggleTreeCollapsed(){
  treeCollapsed=!treeCollapsed;
  document.getElementById('btn-tree-toggle').textContent=treeCollapsed?'Expand all':'Collapse all';
  renderChart(document.getElementById('search').value.trim()||undefined);
}
document.getElementById('search').addEventListener('input',function(){if(this.value.trim()){isolation=null;document.getElementById('filter-banner').classList.remove('visible');}renderChart(this.value.trim()||undefined);});

init();
