<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Accept Invite — KiKxxl-evroTarget</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:linear-gradient(135deg,#eff6ff 0%,#f0f4ff 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(29,78,216,.12);padding:2.5rem 2rem;width:100%;max-width:420px;}
.logo{display:flex;align-items:center;gap:.65rem;margin-bottom:1.5rem;}
.badge{background:#1d4ed8;color:#fff;font-size:.7rem;font-weight:700;letter-spacing:.07em;padding:.28rem .6rem;border-radius:6px;text-transform:uppercase;white-space:nowrap;}
.logo-name{font-size:1rem;font-weight:700;color:#111827;}
h1{font-size:1.3rem;font-weight:700;color:#111827;margin-bottom:.4rem;}
.sub{font-size:.85rem;color:#6b7280;margin-bottom:1.5rem;line-height:1.55;}
.invite-info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:9px;padding:.7rem .9rem;margin-bottom:1.2rem;font-size:.84rem;color:#1e40af;}
.invite-info strong{color:#1d4ed8;}
.field{margin-bottom:.9rem;}
label{display:block;font-size:.78rem;font-weight:600;color:#374151;margin-bottom:.3rem;}
input{width:100%;padding:.55rem .75rem;border:1.5px solid #dde3f0;border-radius:9px;font-family:'Outfit',sans-serif;font-size:.92rem;color:#111827;outline:none;transition:border .15s,box-shadow .15s;}
input:focus{border-color:#1d4ed8;box-shadow:0 0 0 3px #dbeafe;}
.btn{width:100%;padding:.7rem;border:none;border-radius:9px;background:#1d4ed8;color:#fff;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .15s;margin-top:.4rem;}
.btn:hover{background:#1e40af;}
.btn:disabled{background:#93c5fd;cursor:not-allowed;}
.error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;border-radius:8px;padding:.6rem .85rem;font-size:.83rem;margin-top:.85rem;display:none;line-height:1.5;}
.error.visible{display:block;}
.success{background:#f0fdf4;border:1px solid #86efac;color:#166534;border-radius:8px;padding:.85rem 1rem;font-size:.88rem;margin-top:.5rem;display:none;line-height:1.55;}
.success.visible{display:block;}
.footer{text-align:center;margin-top:1.4rem;font-size:.78rem;color:#9ca3af;}
.role-tag{display:inline-block;font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.18rem .5rem;border-radius:4px;background:#fef3c7;color:#92400e;margin-left:.3rem;}
.loading{text-align:center;color:#6b7280;font-size:.9rem;padding:2rem 0;}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span class="badge">KiKxxl-evroTarget</span><span class="logo-name">OrgChart</span></div>

  <div id="loading" class="loading">Verifying invite…</div>

  <div id="form-block" style="display:none">
    <h1>Welcome</h1>
    <p class="sub">Choose a username and password to activate your account.</p>
    <div class="invite-info">Invited as <strong id="invite-email"></strong> with role <span id="invite-role" class="role-tag"></span></div>
    <form id="form" onsubmit="accept(event)">
      <div class="field"><label for="username">Username</label><input id="username" type="text" autocomplete="username" placeholder="e.g. firstname.lastname" required minlength="2"/></div>
      <div class="field"><label for="password">Password (min. 6 characters)</label><input id="password" type="password" autocomplete="new-password" placeholder="••••••••" required minlength="6"/></div>
      <div class="field"><label for="confirm">Confirm password</label><input id="confirm" type="password" autocomplete="new-password" placeholder="••••••••" required/></div>
      <button class="btn" id="btn" type="submit">Activate account</button>
      <div class="error" id="error"></div>
    </form>
  </div>

  <div id="invalid-block" style="display:none">
    <h1>Invite unavailable</h1>
    <p class="sub" id="invalid-msg"></p>
    <a href="/login.html" class="btn" style="display:block;text-align:center;text-decoration:none">Go to login</a>
  </div>

  <div class="success" id="success">✅ Account activated. Redirecting to the chart…</div>

  <p class="footer">Need help? Contact your administrator.</p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

async function init() {
  if (!token) { showInvalid('No invite token in the URL.'); return; }
  try {
    const res = await fetch('/auth/invite/' + encodeURIComponent(token));
    const data = await res.json();
    if (!res.ok) { showInvalid(data.error || 'Invite is invalid.'); return; }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('invite-email').textContent = data.email;
    document.getElementById('invite-role').textContent = data.role;
    document.getElementById('form-block').style.display = 'block';
    document.getElementById('username').focus();
  } catch (e) {
    showInvalid('Could not reach the server.');
  }
}

function showInvalid(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('invalid-msg').textContent = msg;
  document.getElementById('invalid-block').style.display = 'block';
}

async function accept(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  err.classList.remove('visible');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  if (password.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.classList.add('visible'); return; }
  if (password !== confirm) { err.textContent = 'Passwords do not match.'; err.classList.add('visible'); return; }
  btn.disabled = true; btn.textContent = 'Activating…';
  try {
    const res = await fetch('/auth/accept-invite', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      err.textContent = data.error || 'Failed to activate account.';
      err.classList.add('visible');
      btn.disabled = false; btn.textContent = 'Activate account';
      return;
    }
    document.getElementById('form-block').style.display = 'none';
    document.getElementById('success').classList.add('visible');
    setTimeout(() => { window.location.href = '/'; }, 1200);
  } catch {
    err.textContent = 'Connection error. Please try again.';
    err.classList.add('visible');
    btn.disabled = false; btn.textContent = 'Activate account';
  }
}

init();
</script>
</body>
</html>
